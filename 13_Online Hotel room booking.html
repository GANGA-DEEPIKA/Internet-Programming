<!DOCTYPE html>
<html>
<head>
<title>Online Hotel Room Booking</title>
<style>
body{margin:0;font-family:Arial;background:#fff4e6;}
header{background:#8b4513;color:white;text-align:center;padding:25px;}
nav{background:#d2691e;text-align:center;padding:15px;}
nav a{color:white;text-decoration:none;margin:20px;font-weight:bold;}
.container{text-align:center;padding:30px;}
.card{display:inline-block;background:white;width:260px;margin:15px;padding:20px;border-radius:10px;box-shadow:0 0 10px gray;}
input,select,button{width:270px;padding:10px;margin:8px;}
button{background:#8b4513;color:white;border:none;}
footer{background:#8b4513;color:white;text-align:center;padding:15px;}
</style>
</head>
<body>

<header>
<h1>Online Hotel Room Booking</h1>
<p>Book Comfortable Rooms Easily</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Rooms</a>
<a href="#">Booking</a>
<a href="#">Contact</a>
</nav>

<div class="container">
<h2>Available Rooms</h2>

<div class="card">
<h3>Single Room</h3>
<p>₹1500 per night</p>
</div>

<div class="card">
<h3>Double Room</h3>
<p>₹2500 per night</p>
</div>

<div class="card">
<h3>Luxury Suite</h3>
<p>₹5000 per night</p>
</div>

<h2>Book Your Room</h2>
<form>
<input type="text" placeholder="Full Name"><br>
<input type="date"><br>
<input type="date"><br>
<select>
<option>Select Room Type</option>
<option>Single Room</option>
<option>Double Room</option>
<option>Luxury Suite</option>
</select><br>
<button>Book Now</button>
</form>
</div>

<footer>
<p>&copy; 2026 Online Hotel Booking</p>
</footer>

</body>
</html>
