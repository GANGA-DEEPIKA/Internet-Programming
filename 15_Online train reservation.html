<!DOCTYPE html>
<html>
<head>
<title>Online Train Reservation</title>
<style>
body{margin:0;font-family:Arial;background:#f0fff4;}
header{background:#006400;color:white;text-align:center;padding:25px;}
nav{background:#228b22;text-align:center;padding:15px;}
nav a{color:white;text-decoration:none;margin:20px;font-weight:bold;}
.container{text-align:center;padding:30px;}
.card{display:inline-block;background:white;width:250px;margin:15px;padding:20px;border-radius:10px;box-shadow:0 0 10px gray;}
input,select,button{width:270px;padding:10px;margin:8px;}
button{background:#006400;color:white;border:none;}
footer{background:#006400;color:white;text-align:center;padding:15px;}
</style>
</head>
<body>

<header>
<h1>Online Train Reservation System</h1>
<p>Reserve Your Train Tickets Easily</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Trains</a>
<a href="#">Reservation</a>
<a href="#">Contact</a>
</nav>

<div class="container">
<h2>Available Trains</h2>

<div class="card">
<h3>Chennai Express</h3>
<p>Chennai to Hyderabad</p>
</div>

<div class="card">
<h3>Godavari Express</h3>
<p>Vijayawada to Hyderabad</p>
</div>

<div class="card">
<h3>Shatabdi Express</h3>
<p>Chennai to Bangalore</p>
</div>

<h2>Reserve Train Ticket</h2>
<form>
<input type="text" placeholder="Passenger Name"><br>
<input type="text" placeholder="From Station"><br>
<input type="text" placeholder="To Station"><br>
<input type="date"><br>
<select>
<option>Select Class</option>
<option>Sleeper</option>
<option>AC 3 Tier</option>
<option>AC 2 Tier</option>
<option>First Class</option>
</select><br>
<button>Reserve Now</button>
</form>
</div>

<footer>
<p>&copy; 2026 Online Train Reservation</p>
</footer>

</body>
</html>
