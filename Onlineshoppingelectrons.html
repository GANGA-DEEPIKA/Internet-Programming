<!DOCTYPE html>
<html>
<head>
<title>MediCare Hospital - Appointment Booking</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f0fdfa;
}

/* Header */
header{
    background:linear-gradient(135deg,#0f766e,#14b8a6);
    color:white;
    text-align:center;
    padding:70px 20px;
}

header h1{
    font-size:48px;
}

header p{
    font-size:20px;
    margin-top:10px;
}

/* Form Section */
.container{
    width:80%;
    margin:40px auto;
}

.container h2{
    text-align:center;
    color:#0f766e;
    margin-bottom:25px;
    font-size:35px;
}

.form-box{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-weight:bold;
    color:#134e4a;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    height:100px;
}

button{
    margin-top:20px;
    background:#14b8a6;
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0f766e;
}

/* Result Card */
#result{
    margin-top:20px;
}

/* Footer */
footer{
    background:#134e4a;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

@media(max-width:768px){
    .container{
        width:95%;
    }

    header h1{
        font-size:32px;
    }
}
</style>
</head>

<body>

<header>
    <h1>Book Your Doctor Appointment Online</h1>
    <p>Fast, Secure and Convenient Healthcare Scheduling</p>
</header>

<div class="container">

    <h2>Book an Appointment</h2>

    <div class="form-box">

        <label>Patient Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="Enter phone number">

        <label>Department</label>
        <select id="department">
            <option>Cardiology</option>
            <option>Neurology</option>
            <option>Orthopedics</option>
            <option>Dermatology</option>
            <option>Pediatrics</option>
        </select>

        <label>Doctor</label>
        <select id="doctor">
            <option>Dr. Sarah Johnson</option>
            <option>Dr. Michael Lee</option>
            <option>Dr. Emily Davis</option>
            <option>Dr. Robert Wilson</option>
        </select>

        <label>Appointment Date</label>
        <input type="date" id="date">

        <label>Appointment Time</label>
        <input type="time" id="time">

        <label>Symptoms / Notes</label>
        <textarea id="symptoms" placeholder="Describe your symptoms"></textarea>

        <button onclick="bookAppointment()">
            Book Appointment
        </button>

        <div id="result"></div>

    </div>
</div>

<footer>
    © 2026 MediCare Hospital. All Rights Reserved.
</footer>

<script>

function bookAppointment(){

let name=document.getElementById("name").value;
let doctor=document.getElementById("doctor").value;
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;

if(name==="" || date==="" || time===""){
    alert("Please fill all required fields");
    return;
}

document.getElementById("result").innerHTML = `
<div style="
background:#ccfbf1;
color:#115e59;
padding:20px;
border-left:8px solid #14b8a6;
border-radius:10px;
margin-top:20px;
font-size:18px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
">

✅ Appointment Confirmed! <br><br>

👤 Patient: ${name}<br>
🩺 Doctor: ${doctor}<br>
📅 Date: ${date}<br>
⏰ Time: ${time}<br><br>

🏥 Thank you for choosing MediCare Hospital.

</div>
`;
}

</script>

</body>
</html>
