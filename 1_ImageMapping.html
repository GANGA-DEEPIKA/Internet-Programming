<!DOCTYPE html>
<html>
<head>
    <title>Image Mapping Example</title>
</head>
<body>

<h2>Image Mapping in HTML</h2>

<img src="computer.jpg" alt="Computer Setup" usemap="#workmap" width="500">

<map name="workmap">
    <area shape="rect" coords="34,44,270,350"
          href="https://www.google.com" alt="Monitor">

    <area shape="circle" coords="337,300,44"
          href="https://www.youtube.com" alt="Mouse">

    <area shape="square" coords="290,172,333,250"
          href="https://www.wikipedia.org" alt="Phone">
</map>

</body>
</html>
