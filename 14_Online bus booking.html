<!DOCTYPE html>
<html>
<head>
<title>Online Bus Ticket Booking</title>
<style>
body{margin:0;font-family:Arial;background:#eaf7ff;}
header{background:#004d66;color:white;text-align:center;padding:25px;}
nav{background:#008cba;text-align:center;padding:15px;}
nav a{color:white;text-decoration:none;margin:20px;font-weight:bold;}
.container{text-align:center;padding:30px;}
.card{display:inline-block;background:white;width:250px;margin:15px;padding:20px;border-radius:10px;box-shadow:0 0 10px gray;}
input,select,button{width:270px;padding:10px;margin:8px;}
button{background:#004d66;color:white;border:none;}
footer{background:#004d66;color:white;text-align:center;padding:15px;}
</style>
</head>
<body>

<header>
<h1>Online Bus Ticket Booking</h1>
<p>Book Your Bus Tickets Anytime</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Routes</a>
<a href="#">Booking</a>
<a href="#">Contact</a>
</nav>

<div class="container">
<h2>Popular Routes</h2>

<div class="card">
<h3>Chennai to Bangalore</h3>
<p>Fare: ₹700</p>
</div>

<div class="card">
<h3>Hyderabad to Vijayawada</h3>
<p>Fare: ₹600</p>
</div>

<div class="card">
<h3>Chennai to Hyderabad</h3>
<p>Fare: ₹1200</p>
</div>

<h2>Book Bus Ticket</h2>
<form>
<input type="text" placeholder="Passenger Name"><br>
<input type="text" placeholder="From City"><br>
<input type="text" placeholder="To City"><br>
<input type="date"><br>
<select>
<option>Select Bus Type</option>
<option>AC Sleeper</option>
<option>Non-AC Sleeper</option>
<option>Seater</option>
</select><br>
<button>Book Ticket</button>
</form>
</div>

<footer>
<p>&copy; 2026 Online Bus Booking</p>
</footer>

</body>
</html>
