<!DOCTYPE html>
<html>
<head>
    <title>Style Sheets</title>

    <!-- Internal CSS -->
    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: white;
            background-color: teal;
            text-align: center;
            padding: 15px;
        }

        p {
            color: #333;
            font-size: 18px;
            line-height: 1.6;
        }

        .box {
            width: 400px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            border: 2px solid teal;
            border-radius: 10px;
            box-shadow: 2px 2px 10px gray;
        }

        button {
            background-color: teal;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkcyan;
        }
    </style>
</head>
<body>

    <h1 style="color: yellow;">Style Sheets in HTML</h1>

    <div class="box">
        <p>This page demonstrates the use of CSS style sheets.</p>
        <p>CSS is used to add colors, fonts, borders, spacing, and layout.</p>
        <button>Click Me</button>
    </div>

</body>
</html>
